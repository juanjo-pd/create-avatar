<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avatar Conversacional</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* Landing */
    #landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    #landing h1 {
      font-size: 2.5rem;
      font-weight: 300;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #landing p.subtitle {
      color: #888;
      font-size: 1.1rem;
      margin-bottom: 40px;
    }
    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1200px;
      width: 100%;
    }
    .avatar-card {
      background: #14141f;
      border: 1px solid #222;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
    }
    .avatar-card:hover {
      transform: translateY(-4px);
      border-color: #667eea;
      box-shadow: 0 8px 30px rgba(102, 126, 234, 0.15);
    }
    .avatar-preview {
      width: 100%;
      height: 320px;
      background: #1a1a2e;
      position: relative;
    }
    .avatar-preview canvas {
      width: 100% !important;
      height: 100% !important;
    }
    .avatar-info {
      padding: 16px 20px;
    }
    .avatar-info h3 {
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .avatar-info p {
      color: #666;
      font-size: 0.85rem;
    }
    .avatar-info .badge {
      display: inline-block;
      background: #1e1e3a;
      color: #667eea;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      margin-top: 8px;
    }

    /* Chat view */
    #chatview {
      display: none;
      width: 100%;
      height: 100vh;
      position: relative;
    }
    #chatview #head {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
    }
    #chatview #avatar {
      width: 100%;
      height: 100%;
    }
    #chatview #info {
      position: absolute;
      bottom: 10px;
      left: 10px;
      right: 10px;
      font-size: 18px;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    #topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
      z-index: 10;
    }
    #topbar button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    #topbar button:hover { background: rgba(255,255,255,0.2); }
    #topbar .avatar-name {
      font-size: 1.1rem;
      font-weight: 500;
      flex: 1;
    }
    #status {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 0.9rem;
      z-index: 10;
    }
    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 10, 15, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      z-index: 20;
    }
  </style>

  <script type="importmap">
  { "imports":
    {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "talkinghead": "https://cdn.jsdelivr.net/npm/@met4citizen/talkinghead@1.7/modules/talkinghead.mjs",
      "headaudio": "./dist/headaudio.min.mjs"
    }
  }
  </script>
</head>
<body>

<!-- ===== LANDING ===== -->
<div id="landing">
  <h1>Demo Acciona</h1>
  <div class="avatar-grid" id="grid"></div>
</div>

<!-- ===== CHAT VIEW ===== -->
<div id="chatview">
  <div id="head">
    <div id="avatar"></div>
    <div id="info"></div>
  </div>
  <div id="topbar">
    <button id="btnBack">← Volver</button>
    <span class="avatar-name" id="chatName"></span>
    <button id="btnMute">🎤 Silenciar</button>
  </div>
  <div id="status">Cargando avatar...</div>
  <div class="loading-overlay" id="loadingOverlay">Cargando avatar...</div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TalkingHead } from "talkinghead";
import { HeadAudio } from "headaudio";

// Avatar catalog
// Avatars served from TalkingHead GitHub repo
const CDN = "https://raw.githubusercontent.com/met4citizen/TalkingHead/main/avatars";
const avatars = [
  {
    name: "Julia",
    file: `${CDN}/avaturn.glb`,
    body: "F",
    desc: "Avaturn T2 — Estilo realista",
    morph: "72 blendshapes + visemes",
  },
];

// Config
const headaudioProcessor = "./dist/headworklet.min.mjs";
const headaudioModel = "./dist/model-en-mixed.bin";

const model = "gpt-realtime-mini";
const voice = "coral";
const instructions = [
  "Eres un asistente conversacional amable y natural.",
  "Hablas siempre en español de España (castellano).",
  "Tienes un avatar 3D que el usuario puede ver.",
  "Sé conciso, claro y conversacional.",
  "Usa un tono cercano y natural, como si hablaras con un amigo.",
  "Puedes expresar emociones usando las funciones disponibles.",
  "Preséntate brevemente y pregunta en qué puedes ayudar."
].join("\n");

const functions = [
  {
    type: "function",
    name: "set_mood",
    description: "cambiar tu estado de ánimo",
    parameters: {
      type: "object",
      properties: {
        mood: {
          type: "string",
          enum: ["neutral", "happy", "angry", "sad", "fear", "disgust", "love", "sleep"],
          description: "Nombre del estado de ánimo"
        }
      }
    }
  },
  {
    type: "function",
    name: "make_hand_gesture",
    description: "hacer un gesto con las manos",
    parameters: {
      type: "object",
      properties: {
        gesture: {
          type: "string",
          enum: ["handup", "index", "ok", "thumbup", "thumbdown", "side", "shrug", "namaste"],
          description: "Nombre del gesto"
        }
      }
    }
  }
];

// State
let head, headaudio, connection, datachannel, micTrack, audioMuted;
let isClosing = false;
let apiKey = null;

// DOM
const $ = id => document.getElementById(id);

// ===== LANDING: Render avatar previews =====
function renderLanding() {
  const grid = $('grid');
  avatars.forEach((av, i) => {
    const card = document.createElement('div');
    card.className = 'avatar-card';
    card.innerHTML = `
      <div class="avatar-preview" id="preview-${i}"></div>
      <div class="avatar-info">
        <h3>${av.name}</h3>
        <p>${av.desc}</p>
      </div>
    `;
    card.addEventListener('click', () => startChat(av));
    grid.appendChild(card);

    // Render 3D preview
    renderPreview(i, av.file);
  });
}

function renderPreview(idx, glbFile) {
  const container = $(`preview-${idx}`);
  const w = container.clientWidth || 280;
  const h = container.clientHeight || 320;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  const camera = new THREE.PerspectiveCamera(30, w / h, 0.01, 100);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  container.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(1, 1, 2);
  scene.add(dir);

  const loader = new GLTFLoader();
  loader.load(glbFile, (gltf) => {
    scene.add(gltf.scene);
    const box = new THREE.Box3().setFromObject(gltf.scene);
    const size = box.getSize(new THREE.Vector3());
    const headY = box.max.y - size.y * 0.08;
    camera.position.set(0, headY, size.y * 0.4);
    camera.lookAt(0, headY, 0);

    function animate() {
      requestAnimationFrame(animate);
      gltf.scene.rotation.y += 0.003;
      renderer.render(scene, camera);
    }
    animate();
  });
}

// ===== CHAT: Start conversation =====
async function startChat(av) {
  // Load API key from server (.env)
  if (!apiKey) {
    try {
      const resp = await fetch("/api/key");
      const data = await resp.json();
      apiKey = data.key;
    } catch(e) {}
    if (!apiKey) {
      apiKey = prompt("Introduce tu API Key de OpenAI:");
    }
    if (!apiKey) return;
  }

  $('landing').style.display = 'none';
  $('chatview').style.display = 'block';
  $('chatName').textContent = av.name;
  $('loadingOverlay').style.display = 'flex';
  $('loadingOverlay').textContent = `Cargando a ${av.name}...`;

  try {
    // Init TalkingHead with smoother animation settings
    head = new TalkingHead($('avatar'), {
      ttsEndpoint: "N/A",
      lipsyncModules: [],
      cameraView: "upper",
      mixerGainSpeech: 3,
      cameraDistance: -0.9,
      cameraRotateEnable: false,
      lightAmbientIntensity: 0,
      lightDirectIntensity: 0,
      lightSpotIntensity: 0,
      // Smoother transitions
      animateSpeed: 1.0,
    });
    window.head = head;

    // Init HeadAudio with smoother lip-sync
    await head.audioCtx.audioWorklet.addModule(headaudioProcessor);
    headaudio = new HeadAudio(head.audioCtx, {
      // Smoother viseme transitions
      smoothing: 0.6,        // Higher = smoother (0-1)
      threshold: 0.15,       // Ignore very small mouth movements
    });
    await headaudio.loadModel(headaudioModel);

    // Add a small audio delay to compensate for HeadAudio processing latency
    // This syncs the lip movement with the actual audible sound
    const delayNode = head.audioCtx.createDelay(0.15);
    delayNode.delayTime.value = 0.08; // 80ms delay on audio output
    // Insert delay between speech gain and the rest of the audio chain
    head.audioSpeechGainNode.connect(headaudio);

    // Smooth viseme values using exponential moving average (lerp)
    const visemeState = {};
    const LERP_SPEED = 0.35; // 0 = no change, 1 = instant. Lower = smoother

    headaudio.onvalue = (key, value) => {
      // Initialize state
      if (!(key in visemeState)) visemeState[key] = 0;

      // Smooth interpolation
      visemeState[key] += (value - visemeState[key]) * LERP_SPEED;

      // Apply with slight overshoot damping for natural feel
      const smoothed = visemeState[key];
      Object.assign(head.mtAvatar[key], { newvalue: smoothed, needsUpdate: true });
    };
    head.opt.update = headaudio.update.bind(headaudio);

    let lastEnded = 0;
    headaudio.onended = () => {
      lastEnded = Date.now();
      // Smoothly return to neutral when speech ends
      Object.keys(visemeState).forEach(key => {
        visemeState[key] *= 0.3; // Quick fade
      });
    };
    headaudio.onstarted = () => {
      if (Date.now() - lastEnded > 150) {
        head.lookAtCamera(500);
        head.speakWithHands();
      }
    };

    // Load avatar
    await head.showAvatar({ url: av.file, body: av.body, avatarMood: "neutral" });
    $('loadingOverlay').style.display = 'none';
    $('status').textContent = "Conectando con OpenAI...";

    // Start session
    head.start();
    if (head.audioCtx.state !== "running") {
      await head.audioCtx.resume();
    }
    await startSession(av);

  } catch (err) {
    console.error(err);
    $('status').textContent = "Error: " + err.message;
    $('loadingOverlay').style.display = 'none';
  }
}

// ===== WebRTC Session =====
async function startSession(av) {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  [micTrack] = stream.getAudioTracks();

  connection = new RTCPeerConnection();
  connection.addTrack(micTrack, stream);

  connection.ontrack = (e) => {
    if (e.track.kind !== "audio") return;
    audioMuted = new Audio();
    audioMuted.muted = true;
    audioMuted.srcObject = e.streams[0];
    const source = head.audioCtx.createMediaStreamSource(e.streams[0]);
    source.connect(head.audioAnalyzerNode);
  };

  datachannel = connection.createDataChannel("oai");
  datachannel.onopen = () => {
    // Configure session
    datachannel.send(JSON.stringify({
      type: "session.update",
      session: {
        modalities: ["text", "audio"],
        instructions: instructions,
        voice: voice,
        input_audio_transcription: { model: "gpt-realtime-mini" },
        turn_detection: { type: "server_vad", silence_duration_ms: 800 },
        tools: functions,
      }
    }));
    // Initial message
    datachannel.send(JSON.stringify({
      type: "response.create",
      response: {
        input: [{
          type: "message",
          role: "system",
          content: [{ type: "input_text", text: "Preséntate brevemente y pregunta en qué puedes ayudar." }]
        }]
      }
    }));
    $('status').textContent = "🎤 Escuchando...";
  };

  datachannel.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    switch (msg.type) {
      case "output_audio_buffer.started":
        head.isSpeaking = true;
        $('status').textContent = "💬 Hablando...";
        break;
      case "output_audio_buffer.stopped":
        head.isSpeaking = false;
        $('status').textContent = "🎤 Escuchando...";
        if (isClosing) endSession();
        break;
      case "response.function_call_arguments.done":
        handleFunctionCall(msg);
        break;
    }
  };

  await connection.setLocalDescription();

  const fd = new FormData();
  fd.set("sdp", connection.localDescription.sdp);
  fd.set("session", JSON.stringify({
    type: "realtime",
    model: model,
    instructions: instructions,
    audio: { output: { voice: voice } },
    tools: functions,
  }));

  const resp = await fetch(
    `https://api.openai.com/v1/realtime/calls?model=${model}`,
    {
      method: "POST",
      headers: { Authorization: `Bearer ${apiKey}` },
      body: fd,
    }
  );

  if (!resp.ok) {
    throw new Error(`OpenAI API error: ${resp.status} ${await resp.text()}`);
  }

  await connection.setRemoteDescription({ type: "answer", sdp: await resp.text() });

  // Wait for connection
  await new Promise((resolve, reject) => {
    const timeout = setTimeout(() => reject(new Error("Connection timeout")), 10000);
    const check = () => {
      if (connection.connectionState === "connected") {
        clearTimeout(timeout);
        resolve();
      }
    };
    connection.addEventListener("connectionstatechange", check);
  });
}

function handleFunctionCall(msg) {
  try {
    const args = JSON.parse(msg.arguments);
    switch (msg.name) {
      case "set_mood":
        if (args.mood) head.setMood(args.mood);
        break;
      case "make_hand_gesture":
        if (args.gesture) head.playGesture(args.gesture);
        break;
    }
    // Confirm function call
    datachannel.send(JSON.stringify({
      type: "conversation.item.create",
      item: {
        type: "function_call_output",
        call_id: msg.call_id,
        output: JSON.stringify({ success: true }),
      }
    }));
  } catch (e) {
    console.error("Function call error:", e);
  }
}

function endSession() {
  if (connection) {
    connection.close();
    connection = null;
  }
  if (micTrack) {
    micTrack.stop();
    micTrack = null;
  }
  datachannel = null;
  isClosing = false;
  $('status').textContent = "Desconectado";
}

// ===== UI Events =====
document.addEventListener('DOMContentLoaded', () => {
  renderLanding();

  $('btnBack').addEventListener('click', () => {
    endSession();
    if (head) head.stop();
    $('chatview').style.display = 'none';
    $('landing').style.display = 'flex';
  });

  let muted = false;
  $('btnMute').addEventListener('click', () => {
    muted = !muted;
    if (micTrack) micTrack.enabled = !muted;
    $('btnMute').textContent = muted ? "🔇 Activar micro" : "🎤 Silenciar";
  });
});
</script>
</body>
</html>
